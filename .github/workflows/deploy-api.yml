name: Deploy livedhere-api

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "Dockerfile.api"
      - ".github/workflows/deploy-api.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name livedhereacrprod

      - name: Build Docker image
        run: docker build -f Dockerfile.api -t livedhereacrprod.azurecr.io/livedhere-api:${{ github.sha }} .

      - name: Push Docker image
        run: docker push livedhereacrprod.azurecr.io/livedhere-api:${{ github.sha }}

      - name: Update Container App image
        run: az containerapp update --name livedhere-api --resource-group rg-livedhere-prod --image livedhereacrprod.azurecr.io/livedhere-api:${{ github.sha }}