name: Deploy livedhere-api

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "Dockerfile.api"
      - ".github/workflows/deploy-api.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: ./Dockerfile.api
          acrName: livedhereacrprod
          containerAppName: livedhere-api
          resourceGroup: rg-livedhere-prod
          imageToBuild: livedhereacrprod.azurecr.io/livedhere-api:${{ github.sha }}
          targetPort: 8000